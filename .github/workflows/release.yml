name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v1.0.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: mac
            artifact: macos
            files: |
              dist/*.dmg
              dist/*-mac.zip
          - name: Windows
            os: windows-latest
            target: win
            artifact: windows
            files: |
              dist/*.exe
          - name: Linux
            os: ubuntu-latest
            target: linux
            artifact: linux
            files: |
              dist/*.AppImage
              dist/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm exec electron-builder --${{ matrix.target }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ls -lah release-assets
          if gh release view "$TAG_NAME" --repo "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --repo "$REPOSITORY" --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --repo "$REPOSITORY" --title "$TAG_NAME" --notes "Release $TAG_NAME"
          fi
